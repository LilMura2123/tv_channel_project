{% extends 'base.html' %}

{% block title %}Удалить программу - The Daily Bugle{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h2>Удалить программу</h2>
                </div>
                <div class="card-body">
                    <p>Вы уверены, что хотите удалить программу "<strong>{{ program.title }}</strong>"?</p>
                    <p class="text-danger">Это действие нельзя отменить.</p>
                    
                    <form method="post">
                        {% csrf_token %}
                        <div class="d-flex justify-content-between">
                            <a href="{% url 'program_detail' program.pk %}" class="btn btn-outline-primary">Отмена</a>
                            <button type="submit" class="btn btn-danger">Удалить</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
